# ============================================================
# application.properties — DESARROLLO LOCAL
# PostgreSQL 16 @ 192.168.100.173
# NO commitear este archivo (está en .gitignore)
# ============================================================

INATrace.env = DEV

spring.main.banner-mode = off

# Server settings
server.forward-headers-strategy = framework
server.port = 8082

management.health.mail.enabled = false

# To allow uploads of large files (images)
spring.servlet.multipart.max-file-size = 10MB

# increase async request timeout (in milliseconds)
spring.mvc.async.request-timeout = 120000

# Springdoc
springdoc.default-produces-media-type = application/json

# ============================================================
# DataSource — PostgreSQL 16
# ============================================================
INATrace.database.name = inatrace
INATrace.database.hostname = localhost
INATrace.database.port = 5432

spring.datasource.url = jdbc:postgresql://${INATrace.database.hostname}:${INATrace.database.port}/${INATrace.database.name}
spring.datasource.username = inatrace
spring.datasource.password = inatrace

# spring.jpa.show-sql = true
spring.jpa.hibernate.ddl-auto = validate
spring.jpa.autocommit = true

# disable jmx
spring.jmx.enabled = false

# HikariCP pool
spring.datasource.hikari.maximumPoolSize = 10
spring.datasource.hikari.minimumIdle = 2
spring.datasource.hikari.idleTimeout = 30000
spring.datasource.hikari.maxLifetime = 30000

# Hibernate naming strategies
spring.jpa.hibernate.naming.implicit-strategy = org.hibernate.boot.model.naming.ImplicitNamingStrategyComponentPathImpl
spring.jpa.hibernate.naming.physical-strategy = org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.dialect = com.abelium.inatrace.configuration.CustomPostgreSQLDialect

# Hibernate 6 + PostgreSQL: Map @Lob String fields to LONGVARCHAR (TEXT) instead of CLOB/OID
spring.jpa.properties.hibernate.type.preferred_sql_type_code_for_string_lob = 12

# Envers auditing tables
spring.jpa.properties.hibernate.hbm2ddl.auto = update

# ============================================================
# Flyway
# ============================================================
spring.flyway.baseline-on-migrate = true
spring.flyway.out-of-order = true
spring.flyway.validate-on-migrate = false
spring.flyway.check-location = false
spring.flyway.table = schema_version
spring.flyway.ignore-missing-migrations = true
spring.flyway.locations = com.abelium.inatrace.db.migrations,classpath:/db/migrations

# ============================================================
# Jackson
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps = false
spring.jackson.serialization.write-date-timestamps-as-nanoseconds = false
spring.jackson.deserialization.read-date-timestamps-as-nanoseconds = false
spring.jackson.default-property-inclusion = non_null

# Thymeleaf
spring.thymeleaf.mode = HTML
spring.thymeleaf.cache = false

# ============================================================
# Mail — deshabilitado para desarrollo
# ============================================================
spring.mail.properties.mail.smtp.connectiontimeout = 5000
spring.mail.properties.mail.smtp.timeout = 3000
spring.mail.properties.mail.smtp.writetimeout = 5000
spring.mail.properties.mail.debug = false
spring.mail.host = localhost
spring.mail.port = 1025

INATrace.mail.template.from = dev@inatrace.local
INATrace.mail.redirect =
INATrace.mail.sendingEnabled = false
INATrace.loginManager.mail = dev@inatrace.local
INATrace.info.mail = dev@inatrace.local

# ============================================================
# Auth / JWT (Keycloak OIDC)
# ============================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/inatrace


# ============================================================
# Paths
# ============================================================
INATrace.import.path = import/
INATrace.documents.root = documents/
INATrace.fileStorage.root = /tmp/inatrace_file_storage

# ============================================================
# URLs (frontend dev)
# ============================================================
INATrace.emailConfirmation.url = http://localhost:4200/confirm-email/
INATrace.passwordReset.url = http://localhost:4200/reset-password/
INATrace.fe.url = http://localhost:4200

# ============================================================
# Opcional / Integraciones externas (vacío = deshabilitado)
# ============================================================
INATrace.maxmindDB.path =
INATrace.requestLog.token =
INAtrace.exchangerate.apiKey =
beyco.oauth2.clientId =
beyco.oauth2.clientSecret =
beyco.oauth2.url =
beyco.integration.url =
INATrace.agstack.email =
INATrace.agstack.password =
INATrace.agstack.baseURL =
INATrace.agstack.loginBaseURL =
