version: '3.8'

services:

  inatrace-postgres:
    image: postgres:16.10
    container_name: inatrace-postgres
    environment:
      - POSTGRES_PASSWORD=${DB_ROOT_PASSWORD}
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATASOURCE_USERNAME}
    volumes:
      - ${DB_VOLUME}:/var/lib/postgresql/data
    networks:
      - backend
    restart: always

  inatrace-keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: inatrace-kc-test-fortaleza
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://inatrace-postgres:5432/inatrace_keycloak
      KC_DB_USERNAME: ${DATASOURCE_USERNAME}
      KC_DB_PASSWORD: ${DB_ROOT_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_FEATURES: organization
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: 'false'
      KC_HTTP_ENABLED: 'true'
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-testinatrace.espam.edu.ec}
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ../scripts/keycloak/keycloak-theme/inatrace:/opt/keycloak/themes/inatrace
    ports:
      - '8083:8080'
    networks:
      - backend
    depends_on:
      - inatrace-postgres
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8080/auth/realms/master -o /dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s


  inatrace-backend:
    image: ${IMAGE_NAME}:${TAG}
    container_name: inatrace-be
    environment:
      - INATRACE_DATABASE_NAME=${DATABASE_NAME}
      - INATRACE_DATABASE_HOSTNAME=inatrace-postgres
      - SPRING_DATASOURCE_USERNAME=${DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DATASOURCE_PASSWORD}
      - INATRACE_FILESTORAGE_ROOT=${FILE_STORAGE_ROOT}
      - INATRACE_IMPORT_PATH=${IMPORT_PATH}
      - INATRACE_DOCUMENTS_ROOT=${DOCUMENTS_ROOT}
      - INATRACE_REQUESTLOG_TOKEN=${REQUESTLOG_TOKEN}
      - INATRACE_EXCHANGERATE_APIKEY=${EXCHANGERATE_APIKEY}
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-default}
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=${ISSUER_URI}
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/actuator/health | grep -E '200|401' > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    volumes:
      - ${FILE_STORAGE_ROOT_VOL}:${FILE_STORAGE_ROOT}
      - ${IMPORT_PATH_VOL}:${IMPORT_PATH}
      - ${DOCUMENTS_ROOT_VOL}:${DOCUMENTS_ROOT}
    networks:
      - backend
    depends_on:
      - inatrace-postgres
    ports:
      - "${BE_HOST_PORT:-8080}:8080"
    restart: always

networks:
  backend:
    name: inatrace-backend-network
    external: true

volumes:
  inatrace-postgres-vol:
